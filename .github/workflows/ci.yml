name: NeonTech CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  package-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
      - name: Build
        run: python -m build
      - name: Twine check
        run: python -m twine check dist/*
